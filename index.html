<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restricted Area</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #030303;
            color: #ff2222;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Scanline effect for retro CRT monitor feel */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            border: 3px dashed #ff2222;
            background-color: #0a0000;
            box-shadow: 0 0 15px rgba(255, 34, 34, 0.2);
            border-radius: 4px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 900;
            text-shadow: 0 0 8px #ff2222;
            animation: terminalBlink 0.8s steps(2, start) infinite;
        }

        /* Sharp terminal blink */
        @keyframes terminalBlink {
            to {
                visibility: hidden;
                text-shadow: none;
            }
        }

        p {
            font-size: 1.1rem;
            color: #ff6666;
            line-height: 1.6;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .leave-btn {
            display: inline-block;
            background-color: transparent;
            color: #ff2222;
            border: 2px solid #ff2222;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 34, 34, 0.3);
            transition: all 0.1s ease;
        }

        .leave-btn:hover {
            background-color: #ff2222;
            color: #0a0000;
            box-shadow: 0 0 15px #ff2222;
        }
        
        .interaction-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 0, 0, 0.95);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        .interaction-text {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: terminalBlink 1.2s steps(2, start) infinite;
        }
    </style>
</head>
<body>

    <!-- Modern browsers block autoplay sound until the user clicks somewhere on the page -->
    <div id="overlay" class="interaction-overlay" onclick="startAlarm()">
        <div class="interaction-text">&gt; DO NOT CLICK HERE! &lt;</div>
    </div>

    <div class="container">
        <h1>ACCESS DENIED</h1>
        <p>YUH CYAH READ AR YUH DEF?<br>EXIT IMMEDIATELY.</p>
        <button class="leave-btn" onclick="window.location.href='https://google.com';">TERMINATE SESSION</button>
    </div>

    <script>
        let audioCtx;
        let alarmInterval;

        function startAlarm() {
            // Remove the overlay once clicked
            document.getElementById('overlay').style.display = 'none';

            // Web Audio API synthesizes a classic retro dual-tone alarm entirely in code
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let highTone = true;

            alarmInterval = setInterval(() => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                
                // Square wave gives that distinct retro/terminal buzzer sound
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(highTone ? 880 : 440, audioCtx.currentTime); 
                
                // Sharp volume envelope
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
                
                highTone = !highTone;
            }, 400);
        }
    </script>

</body>
</html>
