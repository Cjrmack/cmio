<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kittens And Candy</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #00ff33; /* Glitchy terminal green */
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient scanline background overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .terminal-box {
            width: 90%;
            max-width: 700px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ff33;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.2);
            position: relative;
        }

        .glitch-title {
            font-size: 2rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: glitch 1s linear infinite;
        }

        .system-log {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 120px;
        }

        /* Fake Input Prompt styling */
        .prompt {
            border-bottom: 2px solid #00ff33;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .prompt input {
            background: transparent;
            border: none;
            color: #00ff33;
            font-family: inherit;
            font-size: 1.2rem;
            width: 70%;
            outline: none;
        }

        /* Glitch text effect animation */
        @keyframes glitch {
            0% { text-shadow: 2px 3px 0 #f0f, -2px -3px 0 #0ff; }
            33% { text-shadow: -2px 3px 0 #f0f, 2px -3px 0 #0ff; }
            66% { text-shadow: 2px -3px 0 #f0f, -2px 3px 0 #0ff; }
            100% { text-shadow: -2px -3px 0 #f0f, 2px 3px 0 #0ff; }
        }

        /* Sudden Fullscreen Flash Scare Overlay */
        #flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Blinding white flash */
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
        }

        #flash-overlay.active {
            display: flex;
            animation: invert-flash 0.15s steps(2) infinite;
        }

        @keyframes invert-flash {
            0% { background-color: #ffffff; filter: invert(0); }
            50% { background-color: #000000; filter: invert(1); }
        }

        .creepy-face {
            font-size: 15rem;
            color: #ff0000;
            font-weight: bold;
            transform: scale(1);
            animation: pulse 0.05s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.1); }
        }
    </style>
</head>
<body>

    <div class="terminal-box">
        <div class="glitch-title">> CRITICAL_SECURITY_BREACH</div>
        <div class="system-log" id="log-text">Connecting to local device...</div>
        
        <div class="prompt">
            <span>$ Type "ABORT" to cancel download: </span>
            <input type="text" id="user-input" autocomplete="off" autofocus oninput="checkInput(this)">
        </div>
    </div>

    <!-- Hidden Scare Trigger -->
    <div id="flash-overlay">
        <!-- Text-based face vector / terrifying ascii look -->
        <div class="creepy-face">👁_👁</div>
    </div>

            "Accessing integrated camera feed...",
            "Downloading local storage files... 42%",
            "Downloading local storage files... 89%",
            "THREAT DETECTED. WE SEE YOU."
        ];
        
        let currentLogIndex = 0;
        const logElement = document.getElementById('log-text');

        // Cycle through ominous fake terminal outputs
        const logInterval = setInterval(() => {
            if (currentLogIndex < logs.length) {
                logElement.innerHTML += `<br>> ${logs[currentLogIndex]}`;
                currentLogIndex++;
            } else {
                clearInterval(logInterval);
                // Trigger scare automatically after 3 seconds if they haven't typed
                setTimeout(triggerScare, 3000);
            }
        }, 1500);

        // Instantly scare them if they attempt to interact or type anything
        function checkInput(inputElement) {
            if (inputElement.value.length > 0) {
                triggerScare();
            }
        }

        function triggerScare() {
            const overlay = document.getElementById('flash-overlay');
            overlay.classList.add('active');

            // Force browser audio context if applicable
            // let scream = new Audio('YOUR_DISTORTED_STATIC_SOUND.mp3');
            // scream.play();
        }
    </script>
</body>
</html>
